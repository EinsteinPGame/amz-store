<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amz Collectible — Pokemon TCG Sealed & Booster Pack</title>
  <meta name="description" content="Jual Pokemon TCG sealed product dan loose pack. ETB, booster box, booster bundle dan lainnya. Harga terbaik.">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>

  <header class="header">
    <h1>Amz Collectible</h1>
    <p class="tagline">Pokemon TCG — Sealed & Booster Pack</p>
  </header>

  <div class="filters">
    <input type="text" id="search" placeholder="Cari produk..." autocomplete="off">
    <div class="filter-row">
      <select id="filter-category">
        <option value="">Semua Kategori</option>
        <option value="Sealed">Sealed</option>
        <option value="Loose Pack">Loose Pack</option>
      </select>
      <select id="filter-language">
        <option value="">Semua Bahasa</option>
        <option value="EN">English</option>
        <option value="JP">Japanese</option>
      </select>
    </div>
  </div>

  <div class="sort-bar">
    <span class="stats-bar" id="product-count">—</span>
    <select id="sort">
      <option value="name">Urut: Nama</option>
      <option value="price-asc">Harga: Rendah → Tinggi</option>
      <option value="price-desc">Harga: Tinggi → Rendah</option>
      <option value="stock">Stok: Terbanyak</option>
    </select>
  </div>

  <main class="product-grid" id="product-grid"></main>

  <footer class="footer">
    <p>Ada pertanyaan? <a href="https://wa.me/6500000000" target="_blank" rel="noopener">Hubungi kami di WhatsApp</a></p>
    <p style="margin-top: 6px;">Amz Collectible</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
